name: loop-full-swe
description: Autonomous architecture-aware SWE loop as 4 composable skills over one dynamic-workflow engine. /loop-full-swe runs scope -> survey/plan -> implement + multi-perspective review -> summary/retro in one self-digesting run that proceeds on its own and only breaks to you when a decision genuinely needs a human; /loop-research-plan, /loop-swe-build, /loop-retro run the same engine's stages standalone. Native dynamic-workflow runtime, leaf-only orchestration (all fan-out in the script by design), resumable.
default_agents: [claude]

capabilities:
  instructions:
    - core
  skills:
    - loop-full-swe
    - loop-research-plan
    - loop-swe-build
    - loop-retro
    - loop-build
    - loop-review-committee
    - loop-check-readiness
    - e2e-validate
    - improve-codebase-architecture
    - improve-DDD-architecture
    - design-critique
    - diagnose
    - electron-visual-loop
    - web-visual-loop
    - desktop-app-loop
    - to-issues
  agents:
    - loop-build-agent
    - loop-build-acceptance
    - architecture-review
    - rules-enforcer
    - general-review
  plugins:
    - ui-ux-pro-max
    - frontend-design
  mcp: []
  hooks: []
  bundles: []
