name: loop
description: "Day-to-day build + plan loop. /loop-build implements an agreed plan behind a hard acceptance-gate-before-review rule over two nested agents (build + acceptance); /loop-plan-manual and /loop-plan-semiauto author the plan.md + acceptance.md it consumes, with the grill running fully human (manual) or committee-voted (semiauto). /full-loop-semiauto chains plan-semiauto -> build -> retro in one run; /loop-retro mines the session + subagent transcripts for ways to improve the kit capabilities that ran. Leaves — grill-with-committee/grill-with-docs for stress-testing, loop-review-committee for multi-lens review, loop-check-readiness for feedback-loop audits, plus the architecture/DDD, e2e-validate, diagnose, and visual-loop supporting skills."
default_agents: [claude]

capabilities:
  instructions:
    - core
  skills:
    - loop-build
    - loop-plan-manual
    - loop-plan-semiauto
    - full-loop-semiauto
    - loop-retro
    - grill-with-committee
    - grill-with-docs
    - loop-review-committee
    - loop-check-readiness
    - e2e-validate
    - improve-codebase-architecture
    - improve-DDD-architecture
    - design-critique
    - product-critique
    - critique-committee
    - diagnose
    - electron-visual-loop
    - web-visual-loop
    - desktop-app-loop
    - to-issues
  agents:
    - loop-build-agent
    - loop-build-acceptance
    - loop-retro-agent
    - architecture-review
    - rules-enforcer
    - general-review
    - design-critic
    - product-critic
  plugins:
    - ui-ux-pro-max
    - frontend-design
  mcp: []
  hooks: []
  bundles: []
