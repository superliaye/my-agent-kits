name: feature-loop
description: Autonomous feature-build orchestrator + every skill and plugin the loop calls. Main agent drives plan → implement → review → test → summary, delegating each phase to a sub-agent (one level deep, by design). Ships the full toolkit out of the box — visual loops (Electron + web), design critique, and the Anthropic design/review plugins all included.
default_agents: [claude]

capabilities:
  instructions:
    - core
  skills:
    - feature-loop
    - improve-codebase-architecture
    - diagnose
    - electron-visual-loop
    - web-visual-loop
    - design-critique
  plugins:
    - ui-ux-pro-max
    - frontend-design
    - code-review
  mcp: []
  hooks: []
  bundles: []
