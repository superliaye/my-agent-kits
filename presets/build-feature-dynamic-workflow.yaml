name: build-feature-dynamic-workflow
description: Single-run, full-parity counterpart to build-feature-workflow built on Claude Code's native dynamic-workflow runtime instead of a bash orchestrator. Same architecture-aware feature-build phases (plan → review → design → implement → validate → code-review → triage → design-critique → docs → summary → reflection) run as one in-session dynamic workflow that orchestrates subagents, with open questions collected into a decisions report at the end. Coexists with /build-feature-workflow — use the bash version for durable, resumable, human-in-the-loop builds; use this to run the loop on the native runtime.
default_agents: [claude]

primitives:
  instructions:
    - core
  skills:
    - build-feature-dynamic-workflow
    - e2e-validate
    - improve-codebase-architecture
    - improve-DDD-architecture
    - design-critique
    - diagnose
    - electron-visual-loop
    - web-visual-loop
  plugins:
    - ui-ux-pro-max
    - frontend-design
  mcp: []
  hooks: []
  bundles: []

apm_dependencies: []
