name: experimenting-engineering
description: Experimental add-on to engineering — adds the desktop-app-loop skill and the Anthropic superpowers plugin (TDD, debugging, brainstorming, plans, code review). Default-selected alongside engineering in init. The gstack bundle (30+ /gstack-* planning/design/QA/ship slash commands) is no longer default-installed; it stays available as an opt-in bundle (pick it in the bundles step or pass --bundles gstack). Stable engineering preset stays bundle/plugin-free.
default_agents: [claude]
extends: engineering

capabilities:
  instructions: []
  skills:
    - desktop-app-loop
  plugins:
    - superpowers
  mcp: []
  hooks: []
  bundles: []
